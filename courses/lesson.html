<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-050E36TGR9"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-050E36TGR9");</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Lesson | Pure Extracts TX</title>
    <meta name="description" content="Course lesson viewer for Pure Extracts TX botanical education.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../classroom-styles.css">
    <link rel="stylesheet" href="course-styles.css">
    <link rel="stylesheet" href="../age-verification.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
</head>
<body>
    <!-- Minimal Nav for Lesson Viewer -->
    
    <nav class="nav" id="nav">
        <a href="../index.html" class="nav-logo">Pure Extracts TX<span class="dot"></span></a>
        <div class="nav-links" id="navLinks">
            <a href="../index.html#products">Shop</a>
            <a href="../research.html">Science</a>
            <a href="../blog.html">Learn</a>
            <a href="../courses/login.html">Login</a>
            <a href="../contact.html" class="nav-cta">Get Started</a>
        </div>
        <button class="hamburger" id="navToggle" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <main class="lesson-page">
        <!-- Gated content placeholder -->
        <div id="gatedContent" class="gated-content" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <h2>This Lesson Requires Enrollment</h2>
            <p>Enroll in the course to unlock all lessons and track your progress.</p>
            <a href="../classes.html" class="course-card-btn course-card-btn-primary" style="display:inline-flex; width:auto;">View Pricing</a>
        </div>

        <!-- Lesson layout -->
        <div id="lessonLayout" class="lesson-layout" hidden>
            <aside class="lesson-sidebar" id="lessonSidebar">
                <div class="lesson-sidebar-header">
                    <div class="lesson-sidebar-title" id="sidebarCourseTitle">Course</div>
                    <div class="lesson-sidebar-progress" id="sidebarProgress">0 / 0 completed</div>
                </div>
                <nav id="sidebarLessonNav"></nav>
            </aside>

            <div class="lesson-content-area" id="lessonContentArea">
                <div class="lesson-breadcrumb">
                    <a href="dashboard.html">My Courses</a>
                    <span class="lesson-breadcrumb-sep">/</span>
                    <a href="#" id="breadcrumbCourse">Course</a>
                    <span class="lesson-breadcrumb-sep">/</span>
                    <span id="breadcrumbLesson">Lesson</span>
                </div>

                <h1 id="lessonTitle">Loading...</h1>
                <div class="lesson-time-estimate" id="lessonTime">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span></span>
                </div>

                <div class="lesson-body" id="lessonBody"></div>

                <div class="lesson-footer-actions" id="lessonFooter">
                    <button class="mark-complete-btn" id="markCompleteBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                        <span>Mark Complete</span>
                    </button>
                    <a href="#" class="next-lesson-link" id="nextLessonLink" hidden>
                        Next Lesson
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script src="../script.js"></script>
    <script src="lesson-viewer.js"></script>
    <script src="../analytics.js"></script>
    <script src="../age-verification.js"></script>
</body>
</html>
