<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PETX Images">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1c3a13">
    <title>Image Library - Pure Extracts TX</title>
    <style>
        /* ========================================
           RESET & CUSTOM PROPERTIES
           ======================================== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --seedgreen: #1c3a13;
            --seedgreen-hover: #334e2b;
            --seedgreen-card: #45663c;
            --snowwhite: #fcfcf7;
            --foamwhite: #eff1e4;
            --mossroot: #3d5b34;
            --olivegreen: #61735e;
            --frostedglass: rgba(87, 94, 85, 0.4);
            --fluorescent-green: #d3fa99;
            --lemongrass: #e9f0ca;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --radius-card: 0.75rem;
            --radius-pill: 99em;
            --shadow-card: 0 4px 6px -1px rgb(28 58 19 / 0.08);
            --shadow-card-hover: 0 8px 25px -5px rgb(28 58 19 / 0.15);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --header-height: 56px;
            --pill-bar-height: 48px;
        }

        html {
            font-family: var(--font-sans);
            background: var(--snowwhite);
            color: var(--seedgreen);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            overscroll-behavior-y: contain;
        }

        body {
            min-height: 100dvh;
            padding-top: calc(var(--header-height) + var(--safe-top));
            padding-bottom: calc(var(--pill-bar-height) + var(--safe-bottom) + 8px);
        }

        /* ========================================
           HEADER - Sticky, collapsible
           ======================================== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(252, 252, 247, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(28, 58, 19, 0.08);
            padding: var(--safe-top) 0 0 0;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .header.scrolled {
            box-shadow: 0 1px 12px rgb(28 58 19 / 0.06);
        }

        .header-inner {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            height: var(--header-height);
            padding: 0 1rem;
        }

        .header-logo {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--seedgreen);
            letter-spacing: -0.01em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .header-logo span {
            color: var(--mossroot);
            font-weight: 400;
        }

        .search-wrap {
            flex: 1;
            position: relative;
            min-width: 0;
        }

        .search-wrap svg {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--olivegreen);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            height: 36px;
            border: 1.5px solid rgba(28, 58, 19, 0.12);
            border-radius: var(--radius-pill);
            background: var(--foamwhite);
            padding: 0 2.25rem 0 2.25rem;
            font-size: 0.8125rem;
            font-family: var(--font-sans);
            color: var(--seedgreen);
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .search-input::placeholder { color: var(--olivegreen); opacity: 0.6; }
        .search-input:focus {
            border-color: var(--mossroot);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(61, 91, 52, 0.1);
        }

        .search-clear {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--olivegreen);
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1rem;
            line-height: 1;
            padding: 0;
        }

        .search-clear.visible { display: flex; }

        .header-actions {
            display: flex;
            gap: 0.25rem;
            flex-shrink: 0;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--seedgreen);
            transition: background 0.15s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .icon-btn:hover, .icon-btn:active { background: var(--foamwhite); }

        .icon-btn svg { width: 20px; height: 20px; }

        .icon-btn .badge-count {
            position: absolute;
            top: 2px;
            right: 2px;
            min-width: 16px;
            height: 16px;
            border-radius: 99em;
            background: var(--seedgreen);
            color: var(--fluorescent-green);
            font-size: 0.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            line-height: 1;
        }

        /* ========================================
           STATS PANEL - Collapsible
           ======================================== */
        .stats-panel {
            background: var(--foamwhite);
            border-bottom: 1px solid rgba(28, 58, 19, 0.06);
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s ease, padding 0.35s ease;
            padding: 0 1rem;
        }

        .stats-panel.open {
            max-height: 400px;
            padding: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        @media (min-width: 640px) {
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .stat-card {
            background: #fff;
            border-radius: var(--radius-card);
            padding: 0.75rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--seedgreen);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--olivegreen);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.125rem;
        }

        .progress-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .progress-label {
            font-size: 0.75rem;
            color: var(--olivegreen);
            white-space: nowrap;
            min-width: 90px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(28, 58, 19, 0.08);
            border-radius: 99em;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--mossroot), var(--fluorescent-green));
            border-radius: 99em;
            transition: width 0.6s ease;
        }

        .progress-value {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--seedgreen);
            min-width: 36px;
            text-align: right;
        }

        .category-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin-top: 0.75rem;
        }

        .cat-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.625rem;
            border-radius: var(--radius-pill);
            background: #fff;
            font-size: 0.7rem;
            color: var(--seedgreen);
            border: 1px solid rgba(28, 58, 19, 0.08);
        }

        .cat-pill-count {
            font-weight: 700;
            color: var(--mossroot);
        }

        /* ========================================
           BOTTOM PILL BAR - Type filter
           ======================================== */
        .pill-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 90;
            background: rgba(252, 252, 247, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(28, 58, 19, 0.08);
            padding: 0 0 var(--safe-bottom) 0;
            display: flex;
            align-items: center;
            height: calc(var(--pill-bar-height) + var(--safe-bottom));
            transition: transform 0.3s ease;
        }

        .pill-bar.hidden-by-selection { transform: translateY(100%); }

        .pill-bar-inner {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0 1rem;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            width: 100%;
        }

        .pill-bar-inner::-webkit-scrollbar { display: none; }

        .pill {
            flex-shrink: 0;
            height: 34px;
            min-width: 44px;
            padding: 0 1rem;
            border: 1.5px solid rgba(28, 58, 19, 0.12);
            border-radius: var(--radius-pill);
            background: transparent;
            font-family: var(--font-sans);
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--seedgreen);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
            scroll-snap-align: start;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        .pill:hover { background: var(--foamwhite); }
        .pill:active { transform: scale(0.97); }

        .pill.active {
            background: var(--seedgreen);
            color: var(--fluorescent-green);
            border-color: var(--seedgreen);
            font-weight: 600;
        }

        .pill .pill-count {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .pill-divider {
            width: 1px;
            height: 20px;
            background: rgba(28, 58, 19, 0.1);
            flex-shrink: 0;
        }

        .pill-filter-trigger {
            flex-shrink: 0;
            height: 34px;
            min-width: 44px;
            padding: 0 0.75rem;
            border: 1.5px solid rgba(28, 58, 19, 0.12);
            border-radius: var(--radius-pill);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
            transition: all 0.2s;
            color: var(--seedgreen);
            font-family: var(--font-sans);
            font-size: 0.8125rem;
            font-weight: 500;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .pill-filter-trigger:hover { background: var(--foamwhite); }

        .pill-filter-trigger svg { width: 16px; height: 16px; }

        .pill-filter-trigger .filter-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            min-width: 16px;
            height: 16px;
            border-radius: 99em;
            background: var(--seedgreen);
            color: var(--fluorescent-green);
            font-size: 0.6rem;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        .pill-filter-trigger .filter-badge.visible { display: flex; }

        /* ========================================
           BOTTOM SHEET - Filter panel
           ======================================== */
        .sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(28, 58, 19, 0.25);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .sheet-overlay.open { opacity: 1; pointer-events: auto; }

        .sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 210;
            background: var(--snowwhite);
            border-radius: 1.25rem 1.25rem 0 0;
            max-height: 85dvh;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding-bottom: var(--safe-bottom);
        }

        .sheet.open { transform: translateY(0); }

        .sheet-handle {
            width: 36px;
            height: 4px;
            border-radius: 99em;
            background: rgba(28, 58, 19, 0.15);
            margin: 0.625rem auto 0;
            flex-shrink: 0;
        }

        .sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.25rem 0.5rem;
            flex-shrink: 0;
        }

        .sheet-title {
            font-weight: 700;
            font-size: 1.0625rem;
            color: var(--seedgreen);
        }

        .sheet-reset {
            border: none;
            background: none;
            font-family: var(--font-sans);
            font-size: 0.8125rem;
            color: var(--mossroot);
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-pill);
            -webkit-tap-highlight-color: transparent;
        }

        .sheet-reset:hover { background: var(--foamwhite); }

        .sheet-body {
            padding: 0.5rem 1.25rem 1.25rem;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            flex: 1;
        }

        .sheet-section { margin-bottom: 1.25rem; }
        .sheet-section:last-child { margin-bottom: 0; }

        .sheet-label {
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--olivegreen);
            margin-bottom: 0.5rem;
        }

        .sheet-options {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
        }

        .sheet-option {
            height: 36px;
            min-width: 44px;
            padding: 0 0.875rem;
            border: 1.5px solid rgba(28, 58, 19, 0.12);
            border-radius: var(--radius-pill);
            background: #fff;
            font-family: var(--font-sans);
            font-size: 0.8125rem;
            color: var(--seedgreen);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .sheet-option:hover { border-color: var(--mossroot); }
        .sheet-option:active { transform: scale(0.97); }

        .sheet-option.active {
            background: var(--seedgreen);
            color: var(--fluorescent-green);
            border-color: var(--seedgreen);
            font-weight: 600;
        }

        .sheet-option .opt-count {
            font-size: 0.7rem;
            opacity: 0.65;
        }

        .sheet-apply {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: var(--radius-pill);
            background: var(--seedgreen);
            color: var(--fluorescent-green);
            font-family: var(--font-sans);
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.75rem;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .sheet-apply:hover { background: var(--seedgreen-hover); }
        .sheet-apply:active { transform: scale(0.99); }

        /* ========================================
           IMAGE GRID
           ======================================== */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            padding: 0.75rem;
        }

        @media (min-width: 640px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 0.75rem; padding: 1rem; }
        }

        @media (min-width: 1024px) {
            .grid { grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1.25rem 2rem; }
        }

        @media (min-width: 1440px) {
            .grid { grid-template-columns: repeat(5, 1fr); }
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 1rem;
        }

        .empty-state svg { width: 48px; height: 48px; color: var(--olivegreen); opacity: 0.3; margin-bottom: 1rem; }
        .empty-state-title { font-weight: 600; color: var(--seedgreen); margin-bottom: 0.25rem; }
        .empty-state-sub { font-size: 0.8125rem; color: var(--olivegreen); }

        /* ========================================
           CARD
           ======================================== */
        .card {
            background: #fff;
            border-radius: var(--radius-card);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: box-shadow 0.2s, transform 0.2s;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            contain: layout;
        }

        .card:hover {
            box-shadow: var(--shadow-card-hover);
            transform: translateY(-2px);
        }

        .card:active { transform: scale(0.98); }

        .card.selecting .card-check { opacity: 1; }
        .card.selected { outline: 2.5px solid var(--mossroot); outline-offset: -2.5px; }
        .card.selected .card-check { opacity: 1; }

        .card-thumb {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: var(--foamwhite);
            overflow: hidden;
        }

        .card-thumb img,
        .card-thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            display: block;
        }

        .card-thumb .placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--foamwhite);
        }

        .card-thumb .placeholder svg { width: 32px; height: 32px; color: var(--olivegreen); opacity: 0.2; }

        .card-check {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.7);
            background: rgba(28, 58, 19, 0.2);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 2;
        }

        .card:hover .card-check { opacity: 0.6; }

        .card-check svg { width: 14px; height: 14px; color: transparent; }

        .card.selected .card-check {
            background: var(--mossroot);
            border-color: var(--mossroot);
        }

        .card.selected .card-check svg { color: #fff; }

        .card-badges {
            position: absolute;
            bottom: 0.5rem;
            left: 0.5rem;
            right: 0.5rem;
            display: flex;
            gap: 0.25rem;
            flex-wrap: wrap;
            z-index: 2;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            height: 20px;
            padding: 0 0.5rem;
            border-radius: var(--radius-pill);
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .badge-size {
            background: rgba(252, 252, 247, 0.8);
            color: var(--seedgreen);
        }

        .badge-warn {
            background: rgba(255, 180, 50, 0.85);
            color: #6b3a00;
        }

        .badge-cat {
            background: rgba(28, 58, 19, 0.75);
            color: var(--fluorescent-green);
        }

        .badge-video {
            background: rgba(28, 58, 19, 0.85);
            color: var(--fluorescent-green);
        }

        .desc-dot {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--fluorescent-green);
            border: 1.5px solid #fff;
            z-index: 2;
        }

        .card-body {
            padding: 0.625rem 0.625rem 0.5rem;
        }

        .card-filename {
            font-size: 0.6875rem;
            font-weight: 500;
            color: var(--seedgreen);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.125rem;
        }

        .card-desc {
            font-size: 0.75rem;
            color: var(--olivegreen);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .card-desc.none {
            font-style: italic;
            opacity: 0.5;
        }

        /* ========================================
           LIGHTBOX
           ======================================== */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(28, 58, 19, 0.97);
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            touch-action: none;
        }

        .lightbox.open { opacity: 1; pointer-events: auto; }

        .lightbox-topbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: calc(0.75rem + var(--safe-top)) 1rem 0.75rem;
            background: linear-gradient(to bottom, rgba(28, 58, 19, 0.6), transparent);
        }

        .lb-counter {
            font-size: 0.8125rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
        }

        .lb-actions {
            display: flex;
            gap: 0.25rem;
        }

        .lb-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .lb-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .lb-btn:active { transform: scale(0.95); }

        .lb-btn svg { width: 20px; height: 20px; }

        .lb-download-btn {
            background: var(--mossroot);
        }

        .lb-download-btn:hover { background: var(--seedgreen-hover); }

        .lightbox-media-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .lightbox-media-wrap img,
        .lightbox-media-wrap video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.2s ease;
            touch-action: pinch-zoom;

// ===================================================================
// STATE
// ===================================================================
const state = {
    filters: { type: 'all', cat: 'all', size: 'all', sort: 'name' },
    selected: new Set(),
    selectMode: false,
    lightboxIdx: -1,
    lightboxOpen: false,
    statsOpen: false,
    sheetOpen: false,
    visible: [],
    lastScrollY: 0,
};

// Precompute
const allCategories = new Map();
const photoCount = FILES.filter(f => !isVideo(f.file)).length;
const videoCount = FILES.filter(f => isVideo(f.file)).length;
const descCount = Object.keys(DESCRIPTIONS).length;
const nodescCount = FILES.filter(f => !getDesc(f.file)).length;

FILES.forEach(f => {
    const d = getDesc(f.file);
    if (d) {
        const cat = d.category;
        allCategories.set(cat, (allCategories.get(cat) || 0) + 1);
    }
});

// ===================================================================
// HELPERS
// ===================================================================
function isVideo(f) { return /\.(mp4|mov|webm)$/i.test(f); }

function getDesc(file) { return DESCRIPTIONS['images/' + file] || null; }

function fmtSize(bytes) {
    if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(0) + ' KB';
    return bytes + ' B';
}

function fmtCat(cat) {
    return cat.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

function downloadFile(file) {
    const a = document.createElement('a');
    a.href = 'images/' + file;
    a.download = file;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// ===================================================================
// FILTERING
// ===================================================================
function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const f = state.filters;

    state.visible = FILES.filter(item => {
        const desc = getDesc(item.file);
        const vid = isVideo(item.file);

        // Type
        if (f.type === 'photo' && vid) return false;
        if (f.type === 'video' && !vid) return false;
        if (f.type === 'nodesc' && desc) return false;

        // Category
        if (f.cat !== 'all') {
            if (!desc || desc.category !== f.cat) return false;
        }

        // Size
        if (f.size === 'over1mb' && item.size < 1048576) return false;
        if (f.size === '500k-1mb' && (item.size < 512000 || item.size >= 1048576)) return false;
        if (f.size === 'under500k' && item.size >= 512000) return false;

        // Search
        if (search) {
            const hay = (item.file + ' ' + (desc ? desc.description + ' ' + desc.category + ' ' + (desc.suggested_placement || []).join(' ') : '')).toLowerCase();
            if (!hay.includes(search)) return false;
        }

        return true;
    });

    // Sort
    const s = f.sort;
    if (s === 'size-desc') state.visible.sort((a, b) => b.size - a.size);
    else if (s === 'size-asc') state.visible.sort((a, b) => a.size - b.size);
    else if (s === 'category') state.visible.sort((a, b) => {
        const ca = (getDesc(a.file) || {}).category || 'zzz';
        const cb = (getDesc(b.file) || {}).category || 'zzz';
        return ca.localeCompare(cb) || a.file.localeCompare(b.file);
    });
    else state.visible.sort((a, b) => a.file.localeCompare(b.file));

    renderGrid();
    updatePillCounts();
    updateFilterBadge();
}

// ===================================================================
// GRID RENDERING with IntersectionObserver lazy loading
// ===================================================================
let observer = null;

function renderGrid() {
    const grid = document.getElementById('grid');

    if (state.visible.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <div class="empty-state-title">No images found</div>
                <div class="empty-state-sub">Try adjusting your filters or search</div>
            </div>`;
        return;
    }

    let html = '';
    state.visible.forEach((item, idx) => {
        const desc = getDesc(item.file);
        const vid = isVideo(item.file);
        const sel = state.selected.has(item.file);
        const over = !vid && item.size >= 921600; // >900KB warning for photos
        const over1mb = !vid && item.size >= 1048576;

        const classes = ['card'];
        if (sel) classes.push('selected');
        if (state.selectMode) classes.push('selecting');

        html += `<div class="${classes.join(' ')}" data-idx="${idx}" data-file="${item.file}">
            <div class="card-thumb">
                ${vid
                    ? `<div class="placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                       <video data-src="images/${item.file}" preload="none" muted playsinline></video>`
                    : `<div class="placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
                       <img data-src="images/${item.file}" alt="${desc ? desc.description : item.file}" loading="lazy">`
                }
                <div class="card-check">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                ${desc ? '<div class="desc-dot"></div>' : ''}
                <div class="card-badges">
                    ${vid ? '<span class="badge badge-video">Video</span>' : ''}
                    ${desc ? `<span class="badge badge-cat">${fmtCat(desc.category)}</span>` : ''}
                    ${over1mb ? `<span class="badge badge-warn">${fmtSize(item.size)}</span>`
                        : over ? `<span class="badge badge-warn">${fmtSize(item.size)}</span>`
                        : `<span class="badge badge-size">${fmtSize(item.size)}</span>`}
                </div>
            </div>
            <div class="card-body">
                <div class="card-filename">${item.file}</div>
                <div class="card-desc ${desc ? '' : 'none'}">${desc ? desc.description : 'No description'}</div>
            </div>
        </div>`;
    });

    grid.innerHTML = html;

    // Setup lazy loading
    if (observer) observer.disconnect();
    observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const card = entry.target;
                const img = card.querySelector('img[data-src]');
                const vid = card.querySelector('video[data-src]');
                if (img) {
                    img.src = img.dataset.src;
                    img.removeAttribute('data-src');
                    img.onload = () => {
                        const placeholder = card.querySelector('.placeholder');
                        if (placeholder) placeholder.style.display = 'none';
                    };
                }
                if (vid) {
                    vid.src = vid.dataset.src;
                    vid.removeAttribute('data-src');
                    vid.onloadeddata = () => {
                        const placeholder = card.querySelector('.placeholder');
                        if (placeholder) placeholder.style.display = 'none';
                    };
                }
                observer.unobserve(card);
            }
        });
    }, { rootMargin: '200px 0px' });

    grid.querySelectorAll('.card-thumb').forEach(thumb => observer.observe(thumb));
}

// ===================================================================
// PILL BAR
// ===================================================================
function updatePillCounts() {
    document.getElementById('pillAllCount').textContent = state.visible.length;
    // We show total counts, not filtered counts for the type pills
    document.getElementById('pillPhotosCount').textContent = photoCount;
    document.getElementById('pillVideosCount').textContent = videoCount;
    document.getElementById('pillNodescCount').textContent = nodescCount;
}

function setTypePill(type) {
    state.filters.type = type;
    document.querySelectorAll('.pill[data-type]').forEach(p => {
        p.classList.toggle('active', p.dataset.type === type);
    });
    applyFilters();
}

document.querySelectorAll('.pill[data-type]').forEach(pill => {
    pill.addEventListener('click', () => setTypePill(pill.dataset.type));
});

// ===================================================================
// FILTER SHEET
// ===================================================================
function buildCatOptions() {
    const container = document.getElementById('catOptions');
    let html = '<button class="sheet-option active" data-cat="all">All</button>';
    const sorted = [...allCategories.entries()].sort((a, b) => b[1] - a[1]);
    sorted.forEach(([cat, count]) => {
        html += `<button class="sheet-option" data-cat="${cat}">${fmtCat(cat)} <span class="opt-count">${count}</span></button>`;
    });
    container.innerHTML = html;
}

function openSheet() {
    state.sheetOpen = true;
    document.getElementById('sheetOverlay').classList.add('open');
    document.getElementById('filterSheet').classList.add('open');
    document.body.style.overflow = 'hidden';
    syncSheetState();
}

function closeSheet() {
    state.sheetOpen = false;
    document.getElementById('sheetOverlay').classList.remove('open');
    document.getElementById('filterSheet').classList.remove('open');
    document.body.style.overflow = '';
}

function syncSheetState() {
    document.querySelectorAll('#catOptions .sheet-option').forEach(o => {
        o.classList.toggle('active', o.dataset.cat === state.filters.cat);
    });
    document.querySelectorAll('#sizeOptions .sheet-option').forEach(o => {
        o.classList.toggle('active', o.dataset.size === state.filters.size);
    });
    document.querySelectorAll('#sortOptions .sheet-option').forEach(o => {
        o.classList.toggle('active', o.dataset.sort === state.filters.sort);
    });
}

function updateFilterBadge() {
    let count = 0;
    if (state.filters.cat !== 'all') count++;
    if (state.filters.size !== 'all') count++;
    if (state.filters.sort !== 'name') count++;
    const badge = document.getElementById('filterBadge');
    badge.textContent = count;
    badge.classList.toggle('visible', count > 0);
}

document.getElementById('filterTrigger').addEventListener('click', openSheet);
document.getElementById('sheetOverlay').addEventListener('click', closeSheet);

document.getElementById('sheetReset').addEventListener('click', () => {
    state.filters.cat = 'all';
    state.filters.size = 'all';
    state.filters.sort = 'name';
    syncSheetState();
});

document.getElementById('sheetApply').addEventListener('click', () => {
    closeSheet();
    applyFilters();
});

// Category options
document.getElementById('catOptions').addEventListener('click', (e) => {
    const btn = e.target.closest('.sheet-option');
    if (!btn) return;
    document.querySelectorAll('#catOptions .sheet-option').forEach(o => o.classList.remove('active'));
    btn.classList.add('active');
    state.filters.cat = btn.dataset.cat;
});

// Size options
document.getElementById('sizeOptions').addEventListener('click', (e) => {
    const btn = e.target.closest('.sheet-option');
    if (!btn) return;
    document.querySelectorAll('#sizeOptions .sheet-option').forEach(o => o.classList.remove('active'));
    btn.classList.add('active');
    state.filters.size = btn.dataset.size;
});

// Sort options
document.getElementById('sortOptions').addEventListener('click', (e) => {
    const btn = e.target.closest('.sheet-option');
    if (!btn) return;
    document.querySelectorAll('#sortOptions .sheet-option').forEach(o => o.classList.remove('active'));
    btn.classList.add('active');
    state.filters.sort = btn.dataset.sort;
});

// Sheet swipe-down to dismiss
let sheetTouchStartY = 0;
document.getElementById('filterSheet').addEventListener('touchstart', (e) => {
    sheetTouchStartY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('filterSheet').addEventListener('touchmove', (e) => {
    const dy = e.touches[0].clientY - sheetTouchStartY;
    if (dy > 80) closeSheet();
}, { passive: true });

// ===================================================================
// SEARCH
// ===================================================================
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

let searchDebounce = null;
searchInput.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchClear.classList.toggle('visible', searchInput.value.length > 0);
    searchDebounce = setTimeout(applyFilters, 200);
});

searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchClear.classList.remove('visible');
    applyFilters();
    searchInput.focus();
});

// ===================================================================
// STATS PANEL
// ===================================================================
function updateStats() {
    const totalFiles = FILES.length;
    const totalSize = FILES.reduce((s, f) => s + f.size, 0);

    document.getElementById('statTotal').textContent = totalFiles;
    document.getElementById('statPhotos').textContent = photoCount;
    document.getElementById('statVideos').textContent = videoCount;
    document.getElementById('statSize').textContent = fmtSize(totalSize);

    const pct = Math.round((descCount / totalFiles) * 100);
    document.getElementById('descProgress').style.width = pct + '%';
    document.getElementById('descProgressText').textContent = descCount + '/' + totalFiles;

    // Category pills
    const pillsHtml = [...allCategories.entries()]
        .sort((a, b) => b[1] - a[1])
        .map(([cat, count]) => `<span class="cat-pill">${fmtCat(cat)} <span class="cat-pill-count">${count}</span></span>`)
        .join('');
    document.getElementById('categoryPills').innerHTML = pillsHtml;
}

document.getElementById('statsToggle').addEventListener('click', () => {
    state.statsOpen = !state.statsOpen;
    document.getElementById('statsPanel').classList.toggle('open', state.statsOpen);
});

// ===================================================================
// SELECTION
// ===================================================================
function toggleSelect(file) {
    if (state.selected.has(file)) state.selected.delete(file);
    else state.selected.add(file);
    updateSelectionUI();
}

function updateSelectionUI() {
    const count = state.selected.size;
    document.getElementById('selCount').textContent = count;
    document.getElementById('selBar').classList.toggle('open', count > 0);
    document.getElementById('pillBar').classList.toggle('hidden-by-selection', count > 0);

    // Update card visual states
    document.querySelectorAll('.card').forEach(card => {
        const file = card.dataset.file;
        card.classList.toggle('selected', state.selected.has(file));
    });
}

function enterSelectMode() {
    state.selectMode = true;
    document.querySelectorAll('.card').forEach(c => c.classList.add('selecting'));
    document.getElementById('selectToggle').style.background = 'var(--foamwhite)';
}

function exitSelectMode() {
    state.selectMode = false;
    state.selected.clear();
    document.querySelectorAll('.card').forEach(c => {
        c.classList.remove('selecting', 'selected');
    });
    document.getElementById('selectToggle').style.background = '';
    updateSelectionUI();
}

document.getElementById('selectToggle').addEventListener('click', () => {
    if (state.selectMode) exitSelectMode();
    else enterSelectMode();
});

document.getElementById('selClear').addEventListener('click', exitSelectMode);

document.getElementById('selAllBtn').addEventListener('click', () => {
    state.visible.forEach(f => state.selected.add(f.file));
    updateSelectionUI();
    toast('Selected ' + state.selected.size + ' files');
});

document.getElementById('selDownload').addEventListener('click', () => {
    if (state.selected.size === 0) { toast('Nothing selected'); return; }
    const files = [...state.selected];
    let i = 0;
    function next() {
        if (i >= files.length) return;
        downloadFile(files[i]);
        i++;
        setTimeout(next, 300);
    }
    next();
    toast('Downloading ' + files.length + ' files...');
});

// ===================================================================
// CARD INTERACTIONS (tap, long-press)
// ===================================================================
let longPressTimer = null;
let longPressTriggered = false;
let touchStartX = 0;
let touchStartY = 0;

document.getElementById('grid').addEventListener('pointerdown', (e) => {
    const card = e.target.closest('.card');
    if (!card) return;

    touchStartX = e.clientX;
    touchStartY = e.clientY;
    longPressTriggered = false;

    longPressTimer = setTimeout(() => {
        longPressTriggered = true;
        if (!state.selectMode) enterSelectMode();
        toggleSelect(card.dataset.file);
        // Haptic feedback attempt
        if (navigator.vibrate) navigator.vibrate(30);
    }, 500);
});

document.getElementById('grid').addEventListener('pointermove', (e) => {
    if (!longPressTimer) return;
    const dx = Math.abs(e.clientX - touchStartX);
    const dy = Math.abs(e.clientY - touchStartY);
    if (dx > 10 || dy > 10) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
    }
});

document.getElementById('grid').addEventListener('pointerup', (e) => {
    clearTimeout(longPressTimer);
    longPressTimer = null;

    if (longPressTriggered) return;

    const card = e.target.closest('.card');
    if (!card) return;

    const check = e.target.closest('.card-check');
    if (check || state.selectMode) {
        if (!state.selectMode) enterSelectMode();
        toggleSelect(card.dataset.file);
        return;
    }

    // Normal tap -> open lightbox
    const idx = parseInt(card.dataset.idx);
    openLightbox(idx);
});

document.getElementById('grid').addEventListener('pointercancel', () => {
    clearTimeout(longPressTimer);
    longPressTimer = null;
});

// ===================================================================
// LIGHTBOX
// ===================================================================
function openLightbox(idx) {
    state.lightboxIdx = idx;
    state.lightboxOpen = true;
    renderLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    state.lightboxOpen = false;
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
    const wrap = document.getElementById('lbMediaWrap');
    const vid = wrap.querySelector('video');
    if (vid) vid.pause();
}

function navLightbox(dir) {
    state.lightboxIdx += dir;
    if (state.lightboxIdx < 0) state.lightboxIdx = state.visible.length - 1;
    if (state.lightboxIdx >= state.visible.length) state.lightboxIdx = 0;
    renderLightbox();
}

function renderLightbox() {
    const item = state.visible[state.lightboxIdx];
    if (!item) return;

    const desc = getDesc(item.file);
    const vid = isVideo(item.file);
    const wrap = document.getElementById('lbMediaWrap');

    if (vid) {
        wrap.innerHTML = `<video src="images/${item.file}" controls autoplay playsinline style="max-width:100%;max-height:100%;"></video>`;
    } else {
        wrap.innerHTML = `<img src="images/${item.file}" alt="${desc ? desc.description : item.file}" style="max-width:100%;max-height:100%;">`;
    }

    document.getElementById('lbCounter').textContent = (state.lightboxIdx + 1) + ' / ' + state.visible.length;
    document.getElementById('lbFilename').textContent = item.file + '  (' + fmtSize(item.size) + ')';
    document.getElementById('lbDesc').textContent = desc ? desc.description : 'No description';
    document.getElementById('lbDesc').className = 'lb-desc-text' + (desc ? '' : ' none');

    let tagsHtml = '';
    if (desc) {
        tagsHtml += `<span class="lb-tag cat-tag">${fmtCat(desc.category)}</span>`;
        if (desc.suggested_placement) {
            desc.suggested_placement.forEach(p => {
                tagsHtml += `<span class="lb-tag">${p}</span>`;
            });
        }
    }
    document.getElementById('lbTags').innerHTML = tagsHtml;
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => navLightbox(-1));
document.getElementById('lbNext').addEventListener('click', () => navLightbox(1));

document.getElementById('lbDownload').addEventListener('click', () => {
    const item = state.visible[state.lightboxIdx];
    if (item) {
        downloadFile(item.file);
        toast('Downloading ' + item.file);
    }
});

// Keyboard nav
document.addEventListener('keydown', (e) => {
    if (!state.lightboxOpen) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
});

// Swipe gestures for lightbox
let lbTouchStartX = 0;
let lbTouchStartY = 0;
let lbTouchStartTime = 0;

document.getElementById('lbMediaWrap').addEventListener('touchstart', (e) => {
    lbTouchStartX = e.touches[0].clientX;
    lbTouchStartY = e.touches[0].clientY;
    lbTouchStartTime = Date.now();
}, { passive: true });

document.getElementById('lbMediaWrap').addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - lbTouchStartX;
    const dy = e.changedTouches[0].clientY - lbTouchStartY;
    const dt = Date.now() - lbTouchStartTime;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);

    // Horizontal swipe
    if (absDx > 50 && absDx > absDy * 1.5 && dt < 400) {
        if (dx > 0) navLightbox(-1); // swipe right = prev
        else navLightbox(1); // swipe left = next
        return;
    }

    // Swipe down to dismiss
    if (dy > 80 && absDy > absDx * 1.5 && dt < 400) {
        closeLightbox();
    }
}, { passive: true });

// Tap lightbox background to close
document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === document.getElementById('lbMediaWrap') || e.target === document.getElementById('lightbox')) {
        closeLightbox();
    }
});

// ===================================================================
// EXPORT
// ===================================================================
document.getElementById('exportBtn').addEventListener('click', () => {
    const data = JSON.stringify(DESCRIPTIONS, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'image-descriptions.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('Exported descriptions JSON');
});

// ===================================================================
// HEADER SCROLL BEHAVIOR
// ===================================================================
let scrollTick = false;
window.addEventListener('scroll', () => {
    if (scrollTick) return;
    scrollTick = true;
    requestAnimationFrame(() => {
        const y = window.scrollY;
        document.getElementById('header').classList.toggle('scrolled', y > 10);
        scrollTick = false;
    });
}, { passive: true });

// ===================================================================
// INIT
// ===================================================================
buildCatOptions();
updateStats();
applyFilters();
</script>
